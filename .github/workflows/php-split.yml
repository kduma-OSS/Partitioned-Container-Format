name: PHP subtree split

on:
  push:
    branches: [master]
    paths:
      - 'implementations/php/**'
      - '.github/workflows/php-split.yml'

jobs:
  split:
    name: split implementations/php → kduma-OSS-splits/PHP-PCF-lib
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SPLIT_APP_ID }}
          private-key: ${{ secrets.SPLIT_APP_PRIVATE_KEY }}
          owner: kduma-OSS-splits

      - name: Install splitsh-lite
        run: |
          set -euo pipefail
          curl -sSL https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz \
            | tar -xz -C /tmp
          sudo install /tmp/splitsh-lite /usr/local/bin/splitsh-lite
          splitsh-lite --version || splitsh-lite --help | head -5

      - name: Split implementations/php and push to PHP-PCF-lib (master only)
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          SHA=$(splitsh-lite --prefix=implementations/php --quiet | tail -n1)
          echo "Split SHA: $SHA"
          REMOTE="https://x-access-token:${APP_TOKEN}@github.com/kduma-OSS-splits/PHP-PCF-lib.git"
          git push --force "$REMOTE" "${SHA}:refs/heads/master"
