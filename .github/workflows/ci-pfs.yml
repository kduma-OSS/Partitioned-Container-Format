name: CI / Rust (PFS-MS Reference)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

defaults:
  run:
    working-directory: reference/PFS-MS-v1.0

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference/PFS-MS-v1.0
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference/PFS-MS-v1.0
      - run: cargo build --verbose
      - run: cargo test --all-targets --verbose
      - run: cargo test --doc --verbose

  test-vector:
    name: regenerate spec test vector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference/PFS-MS-v1.0
      - name: Build and run the test-vector example
        run: cargo run --example gen_testvector
      - name: Inspect generated test vector
        run: |
          ls -l pfs_ms_testvector.bin
          test "$(wc -c < pfs_ms_testvector.bin)" = "3066"
      - uses: actions/upload-artifact@v4
        with:
          name: pfs-ms-testvector
          path: reference/PFS-MS-v1.0/pfs_ms_testvector.bin

  coverage:
    name: code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference/PFS-MS-v1.0
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report (lcov)
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - name: Print coverage summary
        run: cargo llvm-cov report
      # The `pfs` CLI binary is exercised manually, not by `cargo test`; the
      # library floor is enforced over everything except the binary and examples.
      - name: Enforce minimum library coverage
        run: |
          cargo llvm-cov report --summary-only \
            --ignore-filename-regex 'bin/|examples/' \
            --fail-under-lines 90 \
            --fail-under-functions 90
      - uses: actions/upload-artifact@v4
        with:
          name: pfs-ms-coverage-lcov
          path: reference/PFS-MS-v1.0/lcov.info

  pfs-tool:
    name: pfs tool (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reference/PFS-MS-v1.0
      - name: Build pfs binary
        run: cargo build --bin pfs --verbose
        working-directory: reference/PFS-MS-v1.0
      - name: Smoke-test pfs CLI
        run: |
          PFS="$GITHUB_WORKSPACE/target/debug/pfs"

          # mkfs + basic file and directory operations
          $PFS mkfs /tmp/t.pfs
          $PFS mkdir /tmp/t.pfs /docs
          printf 'hello world' | $PFS put /tmp/t.pfs /docs/hello.txt -
          $PFS ls /tmp/t.pfs
          $PFS verify /tmp/t.pfs
          $PFS log /tmp/t.pfs
          CONTENT=$($PFS cat /tmp/t.pfs /docs/hello.txt)
          test "$CONTENT" = "hello world"

          # mv and rm
          $PFS mv /tmp/t.pfs /docs/hello.txt /docs/hello2.txt
          $PFS rm /tmp/t.pfs /docs/hello2.txt

          # create → extract round-trip
          mkdir -p /tmp/src/sub
          printf 'file one' > /tmp/src/a.txt
          printf 'file two' > /tmp/src/sub/b.txt
          $PFS create /tmp/a.pfs /tmp/src --no-metadata
          $PFS verify /tmp/a.pfs
          mkdir /tmp/out
          $PFS extract /tmp/a.pfs /tmp/out --no-metadata
          diff -r /tmp/src /tmp/out

          # update → extract round-trip after file modification
          printf 'file one v2' > /tmp/src/a.txt
          $PFS update /tmp/a.pfs /tmp/src --no-metadata
          rm -rf /tmp/out && mkdir /tmp/out
          $PFS extract /tmp/a.pfs /tmp/out --no-metadata
          diff -r /tmp/src /tmp/out
